<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  @font-face {
    font-family: "Noto Sans SC";
    src: url("assets/fonts/NotoSansSC.woff2") format("woff2");
    font-weight: 100 900;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    margin: 0; width: 1920px; height: 1080px;
    overflow: hidden; background: #0a1628;
  }
  body { font-family: "Noto Sans SC", sans-serif; }

  /* ─── Scene base ─── */
  .scene {
    position: absolute; top: 0; left: 0;
    width: 1920px; height: 1080px; overflow: hidden;
  }
  .scene-content {
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
    padding: 100px 160px; gap: 28px;
    box-sizing: border-box;
  }

  /* ─── Scene 1: 《大话西游》— Moonlight & Scroll ─── */
  #scene1 { z-index: 1; background: #0a1628; }
  #scene1 .moon-glow {
    position: absolute; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 1200px; height: 1200px;
    background: radial-gradient(circle, rgba(245,158,11,0.18) 0%, rgba(245,158,11,0.04) 40%, rgba(10,22,40,0) 70%);
    border-radius: 50%; pointer-events: none;
  }
  #scene1 .scroll-lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 38px,
      rgba(245,158,11,0.03) 38px,
      rgba(245,158,11,0.03) 39px
    );
    pointer-events: none;
  }
  .s1-movie-ref {
    font-size: 24px; font-weight: 300; color: rgba(245,158,11,0.5);
    letter-spacing: 0.2em;
  }
  .s1-quote {
    font-size: 68px; font-weight: 900; color: #F8FAFC;
    line-height: 1.3; letter-spacing: 0.03em; max-width: 1400px;
  }
  .s1-quote .hl { color: #F59E0B; }
  .s1-punch {
    font-size: 42px; font-weight: 300; color: #94a3b8;
    letter-spacing: 0.1em; margin-top: 8px;
  }
  /* Treasure box glow */
  .treasure-glow {
    position: absolute; right: 120px; top: 50%;
    transform: translateY(-50%);
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, rgba(245,158,11,0.05) 50%, transparent 70%);
    border-radius: 50%;
    border: 3px solid rgba(245,158,11,0.2);
    pointer-events: none;
  }
  .treasure-glow-inner {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(245,158,11,0.5) 0%, rgba(245,158,11,0) 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .treasure-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px; pointer-events: none;
  }

  /* ─── Scene 2: 《功夫》— Kung Fu Cards ─── */
  #scene2 { z-index: 2; background: #0a1628; opacity: 0; }
  .s2-movie-ref {
    font-size: 22px; font-weight: 300; color: rgba(13,148,136,0.5);
    letter-spacing: 0.2em;
  }
  .s2-title {
    font-size: 52px; font-weight: 900; color: #F8FAFC;
    letter-spacing: 0.04em; line-height: 1.2;
  }
  .s2-title .hl { color: #F59E0B; }
  .s2-cards {
    display: flex; gap: 28px; width: 100%; flex: 1;
    align-items: stretch;
  }
  .s2-card {
    flex: 1; background: rgba(17,24,39,0.85);
    border: 1.5px solid rgba(13,148,136,0.3);
    border-radius: 24px; padding: 40px 36px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .s2-card-icon {
    font-size: 48px; line-height: 1;
  }
  .s2-card-label {
    font-size: 20px; font-weight: 400; color: #64748b;
    letter-spacing: 0.08em;
  }
  .s2-card-value {
    font-size: 36px; font-weight: 700; color: #F8FAFC;
    letter-spacing: 0.04em;
  }
  .s2-card-value.hl { color: #F59E0B; }

  /* Impact burst deco */
  .impact-burst {
    position: absolute; pointer-events: none;
    border: 2px solid rgba(245,158,11,0.15);
    border-radius: 50%;
  }

  /* ─── Scene 3: 《无间道》— Rooftop Split ─── */
  #scene3 { z-index: 3; background: #0a1628; opacity: 0; }
  .s3-movie-ref {
    font-size: 22px; font-weight: 300; color: rgba(245,158,11,0.4);
    letter-spacing: 0.2em;
  }
  .s3-rooftop-line {
    position: absolute; top: 50%; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(245,158,11,0.3) 20%, rgba(245,158,11,0.3) 80%, transparent 100%);
    pointer-events: none;
  }
  .s3-quote {
    font-size: 48px; font-weight: 700; color: #F8FAFC;
    letter-spacing: 0.04em; line-height: 1.3; max-width: 1300px;
  }
  .s3-quote .hl { color: #F59E0B; }
  .s3-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr; gap: 22px;
    width: 100%; flex: 1;
  }
  .s3-feature {
    background: rgba(17,24,39,0.8);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 20px; padding: 32px 36px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .s3-feature-icon { font-size: 38px; }
  .s3-feature-title {
    font-size: 26px; font-weight: 700; color: #F8FAFC;
    letter-spacing: 0.04em;
  }
  .s3-feature-desc {
    font-size: 18px; font-weight: 300; color: #64748b;
    letter-spacing: 0.04em;
  }

  /* ─── Scene 4: 《让子弹飞》— Explosive Brand ─── */
  #scene4 { z-index: 4; background: #0a1628; opacity: 0; }
  .s4-movie-ref {
    font-size: 22px; font-weight: 300; color: rgba(245,158,11,0.4);
    letter-spacing: 0.2em;
  }
  .s4-bullet-line {
    position: absolute; pointer-events: none;
    height: 3px;
    background: linear-gradient(90deg, rgba(245,158,11,0.6), rgba(245,158,11,0));
    border-radius: 2px;
  }
  .s4-brand-area {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 16px;
  }
  .s4-name {
    font-size: 108px; font-weight: 900; color: #F8FAFC;
    letter-spacing: 0.03em; line-height: 1.1;
  }
  .s4-name .dot { color: #F59E0B; }
  .s4-tagline {
    font-size: 34px; font-weight: 300; color: #0D9488;
    letter-spacing: 0.1em;
  }
  .s4-divider {
    width: 100px; height: 5px; background: #F59E0B;
    border-radius: 3px;
  }
  .bullet-particle {
    position: absolute; pointer-events: none;
    width: 6px; height: 6px; background: #F59E0B;
    border-radius: 50%;
  }

  /* ─── Scene 5: CTA ─── */
  #scene5 { z-index: 5; background: #0a1628; opacity: 0; }
  .s5-container {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center; gap: 28px;
  }
  .s5-label {
    font-size: 26px; font-weight: 400; color: #64748b;
    letter-spacing: 0.2em;
  }
  .s5-search-bar {
    display: flex; align-items: center; gap: 20px;
    background: rgba(17,24,39,0.9);
    border: 2px solid rgba(245,158,11,0.5);
    border-radius: 60px; padding: 28px 56px;
    min-width: 640px;
  }
  .s5-search-icon { font-size: 36px; }
  .s5-search-text {
    font-size: 42px; font-weight: 700; color: #F8FAFC;
    letter-spacing: 0.06em;
  }
  .s5-search-text .hl { color: #F59E0B; }
  .s5-hint {
    font-size: 24px; font-weight: 300; color: #64748b;
    letter-spacing: 0.1em;
  }

  /* ─── Film grain overlay ─── */
  .film-grain {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>

<div data-composition-id="main" id="root" data-width="1920" data-height="1080" data-start="0" style="position:relative;width:1920px;height:1080px;overflow:hidden;">

  <!-- ═══ Scene 1: 《大话西游》0-7s ═══ -->
  <div id="scene1" class="scene">
    <div class="moon-glow" style="top:-150px;left:50%;margin-left:-600px;opacity:0.6;"></div>
    <div class="scroll-lines"></div>
    <div class="treasure-glow">
      <div class="treasure-glow-inner"></div>
      <div class="treasure-icon">💎</div>
    </div>
    <div class="scene-content" style="justify-content:center;">
      <div id="s1-ref" class="s1-movie-ref">🎬 《大话西游》</div>
      <div id="s1-quote" class="s1-quote">
        曾经有一份<span class="hl">AI旅行攻略</span><br>摆在我面前
      </div>
      <div id="s1-punch" class="s1-punch">我不用再翻几十个页面了</div>
    </div>
  </div>

  <!-- ═══ Scene 2: 《功夫》7-13.5s ═══ -->
  <div id="scene2" class="scene">
    <div style="position:absolute;top:80px;right:120px;pointer-events:none;">
      <div class="impact-burst" style="width:200px;height:200px;top:0;left:0;"></div>
      <div class="impact-burst" style="width:140px;height:140px;top:30px;left:30px;"></div>
    </div>
    <div class="scene-content" style="justify-content:center;">
      <div id="s2-ref" class="s2-movie-ref">🎬 《功夫》</div>
      <div id="s2-title" class="s2-title">
        输入目的地、预算和天数<br>如同<span class="hl">绝世武功</span>，一招就够
      </div>
      <div id="s2-cards" class="s2-cards">
        <div id="s2c1" class="s2-card">
          <div class="s2-card-icon">📍</div>
          <div class="s2-card-label">目的地</div>
          <div class="s2-card-value">东京</div>
        </div>
        <div id="s2c2" class="s2-card">
          <div class="s2-card-icon">💰</div>
          <div class="s2-card-label">预算</div>
          <div class="s2-card-value hl">¥5,000</div>
        </div>
        <div id="s2c3" class="s2-card">
          <div class="s2-card-icon">📅</div>
          <div class="s2-card-label">天数</div>
          <div class="s2-card-value">5天</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Scene 3: 《无间道》13.5-20s ═══ -->
  <div id="scene3" class="scene">
    <div class="s3-rooftop-line"></div>
    <div style="position:absolute;top:120px;right:160px;width:400px;height:400px;background:radial-gradient(circle,rgba(13,148,136,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;"></div>
    <div class="scene-content" style="justify-content:center;">
      <div id="s3-ref" class="s3-movie-ref">🎬 《无间道》</div>
      <div id="s3-quote" class="s3-quote">
        景点、天气、美食、安全...<br>对不起，<span class="hl">我是个全能的攻略</span>
      </div>
      <div id="s3-grid" class="s3-grid">
        <div id="s3f1" class="s3-feature">
          <div class="s3-feature-icon">🏯</div>
          <div class="s3-feature-title">智能景点推荐</div>
          <div class="s3-feature-desc">AI精准匹配你的旅行偏好</div>
        </div>
        <div id="s3f2" class="s3-feature">
          <div class="s3-feature-icon">🌤️</div>
          <div class="s3-feature-title">实时天气预报</div>
          <div class="s3-feature-desc">出行天气一目了然</div>
        </div>
        <div id="s3f3" class="s3-feature">
          <div class="s3-feature-icon">🍜</div>
          <div class="s3-feature-title">地道美食攻略</div>
          <div class="s3-feature-desc">本地人都在排队的店</div>
        </div>
        <div id="s3f4" class="s3-feature">
          <div class="s3-feature-icon">🛡️</div>
          <div class="s3-feature-title">安全出行提示</div>
          <div class="s3-feature-desc">旅途安心无忧</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Scene 4: 《让子弹飞》20-26.5s ═══ -->
  <div id="scene4" class="scene">
    <div class="bullet-particle" style="top:300px;left:200px;"></div>
    <div class="bullet-particle" style="top:500px;left:600px;"></div>
    <div class="bullet-particle" style="top:700px;left:350px;"></div>
    <div class="bullet-particle" style="top:200px;left:1300px;"></div>
    <div class="bullet-particle" style="top:600px;left:1400px;"></div>
    <div class="bullet-particle" style="top:800px;left:1000px;"></div>
    <div class="s4-bullet-line" style="top:380px;left:-50px;width:500px;"></div>
    <div class="s4-bullet-line" style="top:620px;left:1400px;width:500px;transform:scaleX(-1);"></div>
    <div style="position:absolute;top:60px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(245,158,11,0.06) 0%,transparent 70%);pointer-events:none;"></div>
    <div class="scene-content" style="justify-content:center;">
      <div id="s4-ref" class="s4-movie-ref">🎬 《让子弹飞》</div>
      <div id="s4-brand-area" class="s4-brand-area">
        <div id="s4-name" class="s4-name">
          AI旅行攻略<span class="dot">.</span>
        </div>
        <div id="s4-divider" class="s4-divider"></div>
        <div id="s4-tagline" class="s4-tagline">让攻略飞一会儿</div>
      </div>
    </div>
  </div>

  <!-- ═══ Scene 5: CTA 26.5-30s ═══ -->
  <div id="scene5" class="scene">
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:900px;height:900px;background:radial-gradient(circle,rgba(245,158,11,0.08) 0%,transparent 60%);border-radius:50%;pointer-events:none;"></div>
    <div class="scene-content" style="justify-content:center;align-items:center;">
      <div id="s5-container" class="s5-container">
        <div id="s5-label" class="s5-label">微信搜索</div>
        <div id="s5-search-bar" class="s5-search-bar">
          <div class="s5-search-icon">🔍</div>
          <div class="s5-search-text"><span class="hl">AI</span>旅行攻略</div>
        </div>
        <div id="s5-hint" class="s5-hint">开启你的智能旅行</div>
      </div>
    </div>
  </div>

  <!-- Film grain -->
  <div class="film-grain"></div>

  <!-- Audio -->
  <audio id="narration" data-track-index="2" src="narration.mp3" data-start="0" data-duration="auto" data-volume="1"></audio>
</div>

<script>
  window.__timelines = window.__timelines || {};
  var tl = gsap.timeline({ paused: true });

  var S1 = "#scene1", S2 = "#scene2", S3 = "#scene3", S4 = "#scene4", S5 = "#scene5";
  var T1 = 7, T2 = 13.5, T3 = 20, T4 = 26.5;
  var TRANS = 0.6;

  // ═══ Scene 1: 《大话西游》0-7s ═══
  tl.from("#s1-ref",   { opacity: 0, y: -15, duration: 0.4, ease: "power3.out" }, 0.15);
  tl.from("#s1-quote",  { opacity: 0, y: 40, duration: 0.6, ease: "power3.out" }, 0.45);
  tl.from("#s1-punch",  { opacity: 0, y: 20, duration: 0.45, ease: "power2.out" }, 1.1);

  // Treasure glow breathing
  tl.fromTo(".treasure-glow", { scale: 0.85, opacity: 0.6 }, { scale: 1.05, opacity: 1, duration: 4, ease: "sine.inOut" }, 0.5);
  tl.fromTo(".treasure-glow-inner", { scale: 0.8 }, { scale: 1.3, duration: 4, ease: "sine.inOut" }, 0.5);
  tl.fromTo("#scene1 .moon-glow", { opacity: 0.3 }, { opacity: 0.7, duration: 3.5, ease: "sine.inOut" }, 0.3);

  // Scene 1 exit
  tl.to("#scene1 .scene-content > *", { opacity: 0, y: -30, duration: 0.35, stagger: 0.05, ease: "power2.in" }, T1 - 0.4);
  tl.to("#scene1 .treasure-glow", { opacity: 0, scale: 1.3, duration: 0.4, ease: "power2.in" }, T1 - 0.4);

  // ═══ Transition 1: S1 → S2 (7s) ═══
  tl.to(S1, { opacity: 0, scale: 1.05, duration: TRANS, ease: "power3.inOut" }, T1);
  tl.fromTo(S2, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: TRANS, ease: "power3.inOut" }, T1);
  tl.set("#scene1", { visibility: "hidden" }, T1 + TRANS);

  // ═══ Scene 2: 《功夫》7-13.5s ═══
  tl.from("#s2-ref",  { opacity: 0, y: -10, duration: 0.3, ease: "power2.out" }, T1 + 0.15);
  tl.from("#s2-title", { opacity: 0, x: -60, duration: 0.5, ease: "power3.out" }, T1 + 0.3);

  // Cards burst in like kung fu moves
  tl.from("#s2c1", { opacity: 0, scale: 0.7, y: 80, duration: 0.5, ease: "back.out(1.4)" }, T1 + 0.55);
  tl.from("#s2c2", { opacity: 0, scale: 0.7, y: 80, duration: 0.5, ease: "back.out(1.4)" }, T1 + 0.7);
  tl.from("#s2c3", { opacity: 0, scale: 0.7, y: 80, duration: 0.5, ease: "back.out(1.4)" }, T1 + 0.85);

  // Impact bursts
  tl.fromTo(".impact-burst", { scale: 0.3, opacity: 0.7 }, { scale: 1.2, opacity: 0, duration: 1.2, ease: "power2.out" }, T1 + 0.55);

  // Scene 2 exit
  tl.to("#scene2 .scene-content > *", { opacity: 0, duration: 0.3, stagger: 0.04, ease: "power2.in" }, T2 - 0.35);

  // ═══ Transition 2: S2 → S3 (13.5s) ═══
  tl.to(S2, { opacity: 0, scale: 1.05, duration: TRANS, ease: "power3.inOut" }, T2);
  tl.fromTo(S3, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: TRANS, ease: "power3.inOut" }, T2);
  tl.set("#scene2", { visibility: "hidden" }, T2 + TRANS);

  // ═══ Scene 3: 《无间道》13.5-20s ═══
  tl.from("#s3-ref",   { opacity: 0, duration: 0.35, ease: "power2.out" }, T2 + 0.15);
  tl.from("#s3-quote",  { opacity: 0, x: -50, duration: 0.55, ease: "power3.out" }, T2 + 0.3);

  // Rooftop line
  tl.from(".s3-rooftop-line", { scaleX: 0, transformOrigin: "center", duration: 0.5, ease: "power3.inOut" }, T2 + 0.25);

  // Feature grid
  tl.from("#s3f1", { opacity: 0, y: 30, scale: 0.9, duration: 0.4, ease: "power3.out" }, T2 + 0.55);
  tl.from("#s3f2", { opacity: 0, y: 30, scale: 0.9, duration: 0.4, ease: "power3.out" }, T2 + 0.68);
  tl.from("#s3f3", { opacity: 0, y: 30, scale: 0.9, duration: 0.4, ease: "power3.out" }, T2 + 0.81);
  tl.from("#s3f4", { opacity: 0, y: 30, scale: 0.9, duration: 0.4, ease: "power3.out" }, T2 + 0.94);

  // Scene 3 exit
  tl.to("#scene3 .scene-content > *", { opacity: 0, duration: 0.3, stagger: 0.04, ease: "power2.in" }, T3 - 0.35);

  // ═══ Transition 3: S3 → S4 (20s) ═══
  tl.to(S3, { opacity: 0, scale: 1.05, duration: TRANS, ease: "power3.inOut" }, T3);
  tl.fromTo(S4, { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: TRANS, ease: "power3.inOut" }, T3);
  tl.set("#scene3", { visibility: "hidden" }, T3 + TRANS);

  // ═══ Scene 4: 《让子弹飞》20-26.5s ═══
  tl.from("#s4-ref",   { opacity: 0, duration: 0.3, ease: "power2.out" }, T3 + 0.1);

  // Bullet lines shoot across
  tl.from(".s4-bullet-line", { scaleX: 0, transformOrigin: "left center", duration: 0.5, ease: "power4.out", stagger: 0.1 }, T3 + 0.2);

  // Particles
  tl.from(".bullet-particle", { opacity: 0, scale: 0, duration: 0.4, ease: "back.out(2)", stagger: 0.06 }, T3 + 0.3);

  // Brand assembles
  tl.from("#s4-name",    { opacity: 0, y: 60, duration: 0.65, ease: "power3.out" }, T3 + 0.45);
  tl.from("#s4-divider", { scaleX: 0, transformOrigin: "left center", duration: 0.4, ease: "power3.out" }, T3 + 0.8);
  tl.from("#s4-tagline", { opacity: 0, y: 25, duration: 0.45, ease: "power2.out" }, T3 + 0.95);

  // Ambient glow pulse
  tl.fromTo("#scene4", { background: "#0a1628" }, { background: "#0c1a30", duration: 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, T3 + 0.15);

  // Scene 4 exit
  tl.to("#scene4 .scene-content > *", { opacity: 0, duration: 0.3, stagger: 0.04, ease: "power2.in" }, T4 - 0.35);

  // ═══ Transition 4: S4 → S5 (26.5s) ═══
  tl.to(S4, { opacity: 0, scale: 1.05, duration: TRANS, ease: "power3.inOut" }, T4);
  tl.fromTo(S5, { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: TRANS, ease: "power3.inOut" }, T4);
  tl.set("#scene4", { visibility: "hidden" }, T4 + TRANS);

  // ═══ Scene 5: CTA 26.5-30s ═══
  tl.from("#s5-label",      { opacity: 0, y: -12, duration: 0.3, ease: "power2.out" }, T4 + 0.15);
  tl.from("#s5-search-bar", { opacity: 0, scale: 0.85, duration: 0.5, ease: "back.out(1.4)" }, T4 + 0.3);
  tl.from("#s5-hint",       { opacity: 0, y: 8, duration: 0.35, ease: "power2.out" }, T4 + 0.6);

  // Final fade
  tl.to("#root", { opacity: 0, duration: 0.35, ease: "power2.in" }, 29.6);
  tl.to(".film-grain", { opacity: 0, duration: 0.35, ease: "power2.in" }, 29.6);
  tl.set("#scene5", { visibility: "hidden" }, 30);

  window.__timelines["main"] = tl;
</script>
